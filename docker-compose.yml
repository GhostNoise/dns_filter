services:
  adguard:
    build: ./adguardhome
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"        # DoT
      - "3000:3000/tcp"      # Web UI — setup wizard (first run without env)
      - "8080:80/tcp"        # Web UI — after setup
    volumes:
      - agh_conf:/opt/adguardhome/conf
      - agh_work:/opt/adguardhome/work
    environment:
      - TZ=Europe/Kyiv
      - AGH_USER=${AGH_USER}
      - AGH_PASSWORD=${AGH_PASSWORD}

  # ── DoH reverse proxy (optional, requires DuckDNS domain) ──
  # Start with: docker compose --profile doh up -d
  caddy:
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "443:443/udp"        # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - DUCKDNS_DOMAIN=${DUCKDNS_DOMAIN}
    depends_on:
      - adguard
    profiles:
      - doh

volumes:
  agh_conf:
  agh_work:
  caddy_data:
  caddy_config:
